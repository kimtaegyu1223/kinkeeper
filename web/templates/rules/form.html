{% extends "base.html" %}
{% block title %}{{ "규칙 수정" if rule else "규칙 추가" }} — KinKeeper{% endblock %}
{% block content %}
<h2>{{ "규칙 수정" if rule else "규칙 추가" }}</h2>

<form method="post">
  <label>
    유형
    <select name="type" required>
      <option value="birthday"     {{ "selected" if rule and rule.type == "birthday" }}>생일</option>
      <option value="holiday"      {{ "selected" if rule and rule.type == "holiday" }}>명절</option>
      <option value="health_check" {{ "selected" if rule and rule.type == "health_check" }}>건강검진</option>
      <option value="diet_report"  {{ "selected" if rule and rule.type == "diet_report" }}>다이어트 리포트</option>
      <option value="custom"       {{ "selected" if rule and rule.type == "custom" }}>커스텀</option>
    </select>
  </label>
  <label>
    제목
    <input name="title" value="{{ rule.title if rule else '' }}" required maxlength="200" />
  </label>
  <label>
    리드타임 (며칠 전, 쉼표로 구분)
    <input name="lead_times_days"
           value="{{ rule.lead_times_days | join(', ') if rule else '14, 7, 3, 1' }}"
           placeholder="예: 14, 7, 3, 1" />
    <small>생일·명절 등에서 몇 일 전에 알림을 보낼지 지정합니다.</small>
  </label>
  <label>
    대상 구성원 (쉼표로 구분, 비우면 전체)
    <input name="target_member_ids"
           value="{{ rule.target_member_ids | join(', ') if rule else '' }}"
           placeholder="예: 1, 2, 3 — 비우면 전체" />
  </label>
  <label>
    추가 설정 (JSON)
    <textarea name="config" rows="4">{{ rule.config | tojson(indent=2) if rule else '{}' }}</textarea>
    <small>
      생일: {"member_id": 1}<br>
      명절: {"name": "추석", "lunar_month": 8, "lunar_day": 15}<br>
      건강검진: {"member_id": 1, "period": "yearly", "anchor_date": "2026-03-15"}<br>
      다이어트: {"cadence": "weekly", "weekday": 0, "hour": 9}<br>
      커스텀: {"run_at": "2026-12-01T10:00:00+09:00"}
    </small>
  </label>
  <label>
    활성
    <input name="active" type="checkbox" {{ "checked" if not rule or rule.active else "" }} />
  </label>
  <button type="submit">저장</button>
  <a href="/rules" role="button" class="secondary">취소</a>
</form>
{% endblock %}
