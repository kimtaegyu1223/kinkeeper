{% extends "base.html" %}
{% block title %}{{ "항목 수정" if ct else "항목 추가" }} — KinKeeper{% endblock %}
{% block content %}
<div class="page-head">
  <h1 class="page-title">{{ "검진 항목 수정" if ct else "검진 항목 추가" }}</h1>
</div>

<form class="form" method="post">
  <div class="form-field">
    <label class="form-label" for="t-name">항목명</label>
    <input class="form-input" id="t-name" name="name" required maxlength="100"
           value="{{ ct.name if ct else '' }}" placeholder="예: 위내시경" />
  </div>

  <div class="form-field">
    <label class="form-label" for="t-period">검진 주기 (년)</label>
    <input class="form-input" id="t-period" type="number" name="period_years" min="1" max="10"
           value="{{ ct.period_years if ct else 2 }}" required />
    <p class="form-hint">예: 2 → 2년에 한 번</p>
  </div>

  <div class="form-field">
    <label class="form-label" for="t-gender">대상 성별</label>
    <select class="form-select" id="t-gender" name="gender">
      <option value=""  {{ "selected" if not ct or not ct.gender }}>모두</option>
      <option value="M" {{ "selected" if ct and ct.gender == 'M' }}>남성만</option>
      <option value="F" {{ "selected" if ct and ct.gender == 'F' }}>여성만</option>
    </select>
    <p class="form-hint">여성 전용 검사(유방초음파 등)는 여성만 선택하세요.</p>
  </div>

  <div class="form-field">
    <label class="form-label" for="t-age">최소 나이</label>
    <input class="form-input" id="t-age" name="min_age_str" type="number" min="0" max="120"
           value="{{ ct.min_age if ct and ct.min_age is not none else '' }}"
           placeholder="없으면 비워두세요" />
    <p class="form-hint">이 나이 미만 구성원에게는 알림을 보내지 않습니다.</p>
  </div>

  <div class="form-check">
    <label class="form-check__label" for="t-active">활성</label>
    <input id="t-active" name="active" type="checkbox" {{ "checked" if not ct or ct.active else "" }} />
  </div>

  <div class="form-actions">
    <a class="btn btn--secondary" href="/health" style="height:48px">취소</a>
    <button class="btn btn--primary" type="submit">저장</button>
  </div>
</form>
{% endblock %}
