{% extends "base.html" %}
{% block title %}{{ "구성원 수정" if member else "구성원 추가" }} — KinKeeper{% endblock %}
{% block content %}
<h2>{{ "구성원 수정" if member else "구성원 추가" }}</h2>

<form method="post">
  <label>
    이름
    <input name="name" value="{{ member.name if member else '' }}" required maxlength="50" />
  </label>
  <label>
    텔레그램 사용자 ID
    <input name="telegram_user_id" type="number"
           value="{{ member.telegram_user_id if member and member.telegram_user_id else '' }}"
           placeholder="없으면 비워두세요" />
    <small>봇 DM에서 /start 보내면 확인 가능. 또는 @userinfobot 에게 DM.</small>
  </label>

  <fieldset>
    <legend>생일</legend>
    <label>
      양력 생일
      <input name="birthday_solar" type="date"
             value="{{ member.birthday_solar.isoformat() if member and member.birthday_solar else '' }}" />
    </label>
    <label>
      음력 생일 (월)
      <select name="birthday_lunar_month">
        <option value="">—</option>
        {% for m in range(1, 13) %}
        <option value="{{ m }}"
          {{ "selected" if member and member.birthday_lunar and member.birthday_lunar.month == m }}>
          {{ m }}월
        </option>
        {% endfor %}
      </select>
    </label>
    <label>
      음력 생일 (일)
      <select name="birthday_lunar_day">
        <option value="">—</option>
        {% for d in range(1, 31) %}
        <option value="{{ d }}"
          {{ "selected" if member and member.birthday_lunar and member.birthday_lunar.day == d }}>
          {{ d }}일
        </option>
        {% endfor %}
      </select>
    </label>
    <small>양력과 음력 중 하나만 입력해도 됩니다. 둘 다 있으면 생일 알림에서 선택 가능합니다.</small>
  </fieldset>

  <label>
    활성
    <input name="active" type="checkbox"
           {{ "checked" if not member or member.active else "" }} />
  </label>
  <button type="submit">저장</button>
  <a href="/members" role="button" class="secondary">취소</a>
</form>
{% endblock %}
