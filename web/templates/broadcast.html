{% extends "base.html" %}
{% block title %}공지 보내기 — KinKeeper{% endblock %}
{% block content %}
<h2>공지 보내기</h2>

<form method="post">
  <label>
    메시지 (그룹채널에 발송됩니다)
    <textarea name="message" rows="5" required maxlength="4096"></textarea>
  </label>
  <button type="submit">보내기</button>
</form>

{% if result %}
<hr>
<p class="{{ 'success' if result.ok else 'danger' }}">{{ result.msg }}</p>
{% endif %}
{% endblock %}
